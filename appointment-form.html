<meta name="format-detection" content="telephone=no">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow: visible; height: auto; }
  body { background: transparent; font-family: 'Barlow Condensed', sans-serif; }
  .form-wrap { max-width: 560px; margin: 0 auto; padding: 1.5rem; }
  h2 { font-size: 22px; font-weight: 700; color: #222; margin: 0 0 4px; }
  .subtitle { font-size: 15px; color: #666; margin: 0 0 10px; }
  .chat-note { font-size: 16px; color: #555; background: #f5f7fa; border-radius: 8px; padding: 10px 14px; margin-bottom: 1.5rem; }
  .chat-note a { color: #4a90d9; text-decoration: none; font-weight: 500; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .field.half { margin-bottom: 0; }
  label { font-size: 13px; color: #555; font-weight: 500; }
  label span.req { color: #E24B4A; margin-left: 2px; }
  label span.opt { color: #999; font-weight: 400; font-size: 11px; margin-left: 4px; }
  input, select, textarea { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; padding: 8px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #222; width: 100%; box-sizing: border-box; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #4a90d9; }
  textarea { resize: vertical; min-height: 80px; }
  .radio-group { display: flex; gap: 16px; margin-top: 4px; }
  .radio-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #222; font-weight: 400; cursor: pointer; }
  .radio-group input[type=radio] { width: auto; }
  .divider { border: none; border-top: 0.5px solid #e0e0e0; margin: 1.5rem 0; }
  .section-label { font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .new-patient-badge { display: inline-block; background: #e6f1fb; color: #185fa5; font-size: 12px; padding: 3px 10px; border-radius: 8px; margin-left: 8px; vertical-align: middle; }
  .consent-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px; }
  .consent-row input[type=checkbox] { width: 16px; min-width: 16px; height: 16px; margin-top: 2px; cursor: pointer; }
  .consent-row span { font-size: 13px; color: #666; line-height: 1.5; }
  .submit-btn { width: 100%; padding: 12px; background: #4a90d9; color: #fff; border: none; border-radius: 8px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
  .submit-btn:hover { background: #2c6fad; }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; }
  .success-msg { display: none; text-align: center; padding: 30px 20px; background: #eafaf1; border-radius: 12px; border: 0.5px solid #2eaa5e; margin-top: 20px; }
  .success-msg h3 { color: #1e8a49; font-size: 22px; margin-bottom: 8px; }
  .success-msg p { color: #555; font-size: 15px; line-height: 1.6; }
  .error-msg { display: none; color: #E24B4A; font-size: 13px; text-align: center; margin-top: 10px; }
  .tab-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn { padding: 7px 16px; border-radius: 20px; border: 1.5px solid #ccc; background: #fff; color: #888; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; white-space: nowrap; }
  .tab-btn.active { background: #4a90d9; border-color: #4a90d9; color: #fff; }
  .tab-btn:hover:not(.active) { border-color: #4a90d9; color: #4a90d9; }
  .tab-btn.remove-tab { padding: 7px 10px; border-color: #eee; color: #ccc; background: #fafafa; font-size: 16px; }
  .tab-btn.remove-tab:hover { border-color: #E24B4A; color: #E24B4A; background: #fff5f5; }
  .add-tab-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px dashed #4a90d9; background: transparent; color: #4a90d9; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .add-tab-btn:hover { background: #f0f6ff; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  @media (max-width: 480px) { .row { grid-template-columns: 1fr; } }
</style>
